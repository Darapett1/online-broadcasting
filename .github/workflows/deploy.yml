name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared libs
        run: pnpm run typecheck:libs

      - name: Build frontend
        run: pnpm --filter @workspace/lightbearer run build
        env:
          # Vite requires PORT even though it is unused during a static build
          PORT: "3000"
          # Set to "/" if using a custom domain, or "/<repo-name>/" for a project page
          # Example for project page: BASE_PATH: "/lightbearer/"
          BASE_PATH: ${{ vars.BASE_PATH || '/' }}
          # Full URL of your Cloud Run backend, e.g. https://lightbearer-abc123-uc.a.run.app
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/lightbearer/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
